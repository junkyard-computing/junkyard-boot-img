# This workflow builds a Linux kernel and uploads the compiled artifacts.
# It is triggered automatically when kernel configuration or source files change,
# ensuring the kernel artifact stays in sync with the latest committed kernel changes.

# Adapted from: https://github.com/ebeutz/junkyard-slurm/blob/main/.github/workflows/kernel.yml

name: build-kernel

# Controls when the workflow will run
on:
  # Triggers the workflow on push events, but only when files under the kernel/ directory are modified.
  push:
    paths:
      - "kernel/**"
    branches:
      - "main"

  # Allows you to run this workflow manually from the Actions tab.
  # Also lets you pick which runner to build on and which branch to build from
  # (branch selection is the built-in "Use workflow from" dropdown in the UI).
  workflow_dispatch:
    inputs:
      runner:
        description: "Where to run the build"
        type: choice
        default: ubuntu-latest
        options:
          - ubuntu-latest
          - x86-kernel-builder-atkinson

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # Defaults to the latest available Ubuntu GitHub-hosted runner on push events.
    # On manual (workflow_dispatch) runs, uses whichever runner was picked in the UI.
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Self-hosted runners persist their workspace and any background
      # processes across job runs (unlike GitHub-hosted, which starts every
      # job on a fresh VM). If a previous run was cancelled mid-build, Bazel's
      # background server process can be left running and holding file locks,
      # and stale git/repo lock files can block the next sync. Clear all of
      # that out before doing anything else. GitHub-hosted runners have no
      # leftover state to clean, so this is skipped there entirely.
      - name: Clean up leftover state from a previous cancelled run
        if: runner.environment == 'self-hosted'
        run: |
          KERNEL_DIR="$GITHUB_WORKSPACE/kernel/source"
          if [ -d "$KERNEL_DIR" ]; then
            (cd "$KERNEL_DIR" && bazel shutdown) || true
          fi
          pkill -f bazel || true
          find "$GITHUB_WORKSPACE" -name "*.lock" -delete || true

      # Reclaim space on the root volume. ubuntu-latest ships only ~14 GB free on
      # / but a ~70 GB ephemeral disk at /mnt. The AOSP `repo sync` + Bazel build
      # is tens of GB, and Bazel's output base lives under ~/.cache/bazel (on /),
      # so a full kernel build exhausts / and the runner dies with
      # "No space left on device". Drop the preinstalled toolchains we never use
      # to buy back ~25-30 GB on /.
      # Only needed on GitHub-hosted runners - self-hosted machines aren't disk-constrained
      # this way and don't have these preinstalled toolchains to begin with.
      - name: Free up disk space on the root volume
        if: runner.environment == 'github-hosted'
        run: |
          echo "Before:"; df -h / /mnt
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/local/.ghcup \
            /opt/ghc \
            /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force || true
          sudo apt-get clean || true
          echo "After:"; df -h / /mnt

      # Mounts a volatile overlayfs over the working directory to speed up the build.
      # All file writes go to a temporary in-memory layer instead of hitting the disk directly.
      # The upper/work layers are placed on the large /mnt ephemeral disk (not /),
      # so the repo checkout and in-tree build outputs don't crowd the small root
      # volume. (Bazel's own output base still lives under ~/.cache/bazel on /,
      # which is why the cleanup step above is also required.)
      # Only needed on GitHub-hosted runners - self-hosted machines have their own
      # persistent, appropriately-sized disk and don't need this workaround.
      - name: Mount volatile overlayfs for faster builds
        if: runner.environment == 'github-hosted'
        run: |
          mkdir a
          sudo mkdir -p /mnt/overlay/upper /mnt/overlay/work
          sudo chown "$(id -u):$(id -g)" /mnt/overlay/upper /mnt/overlay/work
          sudo mount -t overlay overlay \
            -o lowerdir="$PWD/a",upperdir=/mnt/overlay/upper,workdir=/mnt/overlay/work,volatile \
            "$PWD"

      # Checks out the repository under $GITHUB_WORKSPACE so subsequent steps
      # can access the kernel source, config files, and justfiles.
      # With no ref specified, this checks out whatever triggered the run:
      # the pushed branch on `push` events, or whichever branch was picked in
      # the "Use workflow from" dropdown on manual workflow_dispatch runs.
      - uses: actions/checkout@v5

      # Downloads and installs the `just` command runner binary directly from upstream.
      # Only needed on GitHub-hosted runners - self-hosted machines already have
      # `just` installed permanently.
      - name: Install just
        if: runner.environment == 'github-hosted'
        run: curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | sudo bash -s -- --to /usr/bin

      # Installs required build dependencies via apt.
      # - `repo`: Google's tool for managing multi-repo projects (used for kernel source)
      # - `kmod`: utilities for loading/managing Linux kernel modules
      # - `debootstrap`: bootstraps a Debian/Ubuntu root filesystem, required by the justfile
      # - `age`: file encryption/decryption tool required by the justfile (justfile:28
      #   does `_age := require("age")` before any recipe runs, to decrypt a secret
      #   used during the build)
      # `eatmydata` is used throughout to disable fsync/fdatasync calls, which speeds up
      # apt operations significantly in a throwaway CI environment where data durability
      # is not a concern.
      # Only needed on GitHub-hosted runners - self-hosted machines already have
      # these installed permanently.
      - name: Install dependencies
        if: runner.environment == 'github-hosted'
        run: |
          sudo rm -f /var/lib/man-db/auto-update
          sudo apt update
          sudo eatmydata apt install -y repo kmod debootstrap systemd-container qemu-user-binfmt age

      # Compiles the kernel and prepares the module tree and source artifacts using
      # the `just` command runner. Two targets are invoked:
      # - `build_kernel`: compiles the kernel image from source
      # - `update_kernel_modules_and_source`: installs kernel modules and packages
      #   the kernel source/headers needed for out-of-tree module builds
      - name: Compile Kernel
        run: |
          eatmydata just build_kernel
          eatmydata just update_kernel_modules_and_source

      # Uploads the compiled kernel tarball as a GitHub Actions artifact.
      - uses: actions/upload-artifact@v5
        with:
          name: kernel
          path: kernel/kernel.tar

      # Uploads the full kernel build output directory as a separate artifact.
      # This includes intermediate build files, Module.symvers, and other outputs
      # that may be needed for debugging or building external kernel modules.
      - uses: actions/upload-artifact@v5
        with:
          name: kernel-build-out
          path: kernel/out/
