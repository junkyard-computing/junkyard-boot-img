# Bound shutdown so a wedged service can't hold a reboot hostage.
#
# Observed 2026-07-19 on felix: polkit/NetworkManager/dbus each hung on stop and
# systemd kept EXTENDING their timeouts (5min -> 6m31s -> 8m1s -> 11m -> 14m),
# so a single reboot cost 10+ minutes and looked exactly like a boot hang over
# SSH. For a headless appliance a reboot must be bounded and deterministic:
# give a service a short grace period, then SIGKILL it.
[Manager]
DefaultTimeoutStopSec=15s
DefaultTimeoutAbortSec=15s
